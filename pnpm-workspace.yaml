# pnpm 11 keeps these settings here (no longer in package.json's "pnpm" field).
#
# esbuild ships a prebuilt binary, so its build script is allowed to run cleanly.
# keytar and @vscode/vsce-sign are only used by `vsce` for credential storage at
# publish time; building them is not needed to compile or package, so pnpm may
# print a harmless "ignored build scripts" notice for them. That notice does not
# fail the install.
onlyBuiltDependencies:
  - esbuild

# Skip pnpm's pre-run dependency check so `pnpm run <script>` stays fast.
verifyDepsBeforeRun: false
